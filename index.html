<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Дартс | Живой ввод бросков | Адаптив</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a472a;
            margin: 0;
            padding: 12px;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, system-ui, sans-serif;
            color: #f0f3e8;
        }
        .container {
            max-width: 100%;
            background: rgba(10, 25, 15, 0.95);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid #d4af37;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin: 0 0 0.2rem;
            background: linear-gradient(135deg, #FFD966, #C5A028);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            font-size: 0.7rem;
            color: #c0dfb0;
            border-bottom: 1px dashed #6a8e5c;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        /* онлайн панель */
        .online-panel {
            background: #0e2a1c;
            border-radius: 1.2rem;
            padding: 0.8rem;
            margin-bottom: 16px;
            border: 1px solid #d4af37;
        }
        .live-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0;
        }
        .player-live-btn {
            background: #1d3b28;
            border: 2px solid #f5b642;
            border-radius: 60px;
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-align: center;
            color: #ffefcf;
            touch-action: manipulation;
        }
        .player-live-btn:active {
            background: #f5b642;
            color: #1e3a2a;
            transform: scale(0.98);
        }
        .score-input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }
        .score-input-group input {
            background: #1d3522;
            border: 1px solid #d4af37;
            padding: 12px;
            border-radius: 40px;
            font-size: 1.1rem;
            width: 100px;
            text-align: center;
            color: #ffefcf;
        }
        .score-input-group button {
            flex: 1;
            background: #f5b642;
            padding: 12px;
            font-size: 0.9rem;
        }
        .current-session {
            background: #0b2417;
            border-radius: 1rem;
            padding: 10px;
            margin: 12px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .current-badge {
            background: #2c5e3a;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap;
        }
        .reset-session {
            background: #6d4c3c;
            width: 100%;
            padding: 10px;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .history-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .history-actions button {
            flex: 1;
            padding: 10px 8px;
            font-size: 0.75rem;
            background: #4a5b3e;
            color: #ffecb3;
        }
        .stats-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }
        .player-card {
            background: #0c2a18;
            border-radius: 1.2rem;
            padding: 0.8rem;
            border-left: 6px solid #f5b642;
        }
        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .stat {
            font-size: 0.8rem;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
        }
        .stat-value {
            font-weight: 800;
            font-size: 1.1rem;
            color: #ffd966;
        }
        .table-wrapper {
            overflow-x: auto;
            margin: 16px 0;
            border-radius: 1rem;
            background: #0b2417;
        }
        table {
            width: 100%;
            min-width: 500px;
            border-collapse: collapse;
            font-size: 0.7rem;
        }
        th, td {
            padding: 8px 4px;
            text-align: center;
            border-bottom: 1px solid #2e6a3e;
        }
        th {
            background: #1c462c;
            color: #fad974;
        }
        .delete-btn {
            background: #a13a2c;
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .record-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }
        .record-item {
            background: #1a3b26;
            border-radius: 1rem;
            padding: 8px;
            text-align: center;
        }
        .record-number {
            font-size: 1.4rem;
            font-weight: bold;
            color: #f3bc5c;
        }
        .footer {
            text-align: center;
            font-size: 0.6rem;
            margin-top: 16px;
            color: #aacf9e;
        }
        .info-note {
            background: #1f3f2a;
            border-radius: 1rem;
            padding: 6px 12px;
            margin: 10px 0;
            font-size: 0.7rem;
        }
        button {
            touch-action: manipulation;
            cursor: pointer;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.1s;
        }
        button:active {
            transform: scale(0.97);
        }
        @media (min-width: 600px) {
            body { padding: 20px; }
            .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
            .live-buttons { flex-direction: row; justify-content: center; }
            .player-live-btn { width: auto; min-width: 140px; }
            .stats-cards { flex-direction: row; flex-wrap: wrap; }
            .player-card { flex: 1; min-width: 180px; }
            .record-box { flex-direction: row; }
            .score-input-group { justify-content: center; }
            .reset-session { width: auto; margin-top: 0; }
            .history-actions button { flex: none; padding: 8px 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 ДАРТС | ЖИВОЙ ВВОД</h1>
    <div class="sub">Бросок → автоматическая партия (10 бросков)</div>

    <!-- Онлайн панель -->
    <div class="online-panel">
        <div style="text-align:center; font-weight:bold; font-size:0.85rem;">⚡ ТЕКУЩАЯ СЕССИЯ</div>
        <div id="currentSessionDisplay" class="current-session">
            <span style="color:#ffda88; font-size:0.7rem;">Нет активных бросков</span>
        </div>
        <div class="live-buttons" id="liveButtons"></div>
        
        <div class="score-input-group">
            <span style="font-size:0.8rem;">🎯 Очки:</span>
            <input type="number" id="manualScore" value="20" step="1" min="0" max="180">
            <button id="manualAddBtn" style="background:#f5b642;">➕ Добавить выбранному</button>
        </div>
        <button id="resetSessionBtn" class="reset-session" style="background:#6d4c3c;">🔄 Сбросить текущую сессию</button>
    </div>

    <!-- Кнопки управления -->
    <div class="history-actions">
        <input type="file" id="importFileInput" accept=".csv,.json,.txt" style="display:none;">
        <button id="importBtn">📂 Импорт</button>
        <button id="printBtn">🖨️ Печать</button>
        <button id="emailBtn">📧 Отчёт</button>
        <button id="resetAllBtn" style="background:#6d4c3c;">🗑️ Сброс истории</button>
    </div>

    <!-- Карточки статистики -->
    <div id="statsCards" class="stats-cards"></div>

    <!-- Таблица партий -->
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Дата</th><th>Игрок</th><th>Очки партии (10)</th><th>Сумма</th><th></th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" style="text-align:center;">Нет партий. Добавьте броски!</td></tr></tbody>
        </table>
    </div>

    <div id="ratingArea"></div>
    <div id="recordsArea" class="record-box"></div>
    <div class="footer">✅ Каждый бросок добавляется игроку. После 10 бросков → партия сохраняется автоматически.</div>
</div>

<script>
    // ---------- ДАННЫЕ ----------
    let partiesData = [];          // сохранённые партии { id, player, scores[], total, dateStr }
    let currentSessions = {
        "Стрельцов А.В.": [],
        "Ишимцев А.Г.": [],
        "Новоселов Е.В.": []
    };
    const ALL_PLAYERS = ["Стрельцов А.В.", "Ишимцев А.Г.", "Новоселов Е.В."];

    // DOM
    const liveButtonsDiv = document.getElementById('liveButtons');
    const sessionDisplay = document.getElementById('currentSessionDisplay');
    const manualScoreInput = document.getElementById('manualScore');
    const manualAddBtn = document.getElementById('manualAddBtn');
    const resetSessionBtn = document.getElementById('resetSessionBtn');
    const importBtn = document.getElementById('importBtn');
    const importFileInput = document.getElementById('importFileInput');
    const printBtn = document.getElementById('printBtn');
    const emailBtn = document.getElementById('emailBtn');
    const resetAllBtn = document.getElementById('resetAllBtn');
    const tableBody = document.getElementById('tableBody');
    const statsCardsDiv = document.getElementById('statsCards');
    const ratingArea = document.getElementById('ratingArea');
    const recordsArea = document.getElementById('recordsArea');

    // helpers
    function getTodayDate() {
        return new Date().toISOString().slice(0,10);
    }

    // сохранить партию (10 бросков)
    function saveParty(player, scoresArray) {
        if (scoresArray.length !== 10) return false;
        const total = scoresArray.reduce((s,v) => s+v, 0);
        partiesData.push({
            id: Date.now() + Math.random(),
            player: player,
            scores: [...scoresArray],
            total: total,
            dateStr: getTodayDate()
        });
        currentSessions[player] = [];
        renderAll();
        return true;
    }

    // добавить бросок
    function addThrow(player, points) {
        if (points < 0 || points > 180) {
            alert("Очки от 0 до 180");
            return false;
        }
        const session = currentSessions[player];
        session.push(points);
        if (session.length === 10) {
            saveParty(player, [...session]);
        }
        renderAll();
        return true;
    }

    function resetCurrentSessions() {
        if (confirm("Сбросить все незавершённые броски?")) {
            for (let p of ALL_PLAYERS) currentSessions[p] = [];
            renderAll();
        }
    }

    function deletePartyById(id) {
        partiesData = partiesData.filter(p => p.id !== id);
        renderAll();
    }

    // статистика
    function computeStats() {
        const map = new Map();
        for (let p of ALL_PLAYERS) map.set(p, { parties: 0, totalPoints: 0, bestParty: 0 });
        for (let party of partiesData) {
            const rec = map.get(party.player);
            rec.parties++;
            rec.totalPoints += party.total;
            if (party.total > rec.bestParty) rec.bestParty = party.total;
        }
        return map;
    }

    // отрисовка всего
    function renderStatsCards(statsMap) {
        let html = '';
        for (let [player, data] of statsMap.entries()) {
            html += `
                <div class="player-card">
                    <div class="player-name">🎯 ${player}</div>
                    <div class="stat"><span>📌 Партий:</span><span class="stat-value">${data.parties}</span></div>
                    <div class="stat"><span>🏆 Сумма:</span><span class="stat-value">${data.totalPoints}</span></div>
                    <div class="stat"><span>⚡ Рекорд партии:</span><span class="stat-value">${data.bestParty}</span></div>
                </div>
            `;
        }
        statsCardsDiv.innerHTML = html;
    }

    function renderHistory() {
        if (partiesData.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Нет завершённых партий. Добавьте броски!</td></tr>';
            return;
        }
        const sorted = [...partiesData].sort((a,b) => (b.dateStr||'').localeCompare(a.dateStr||''));
        let rows = '';
        for (let p of sorted) {
            rows += `
                <tr>
                    <td style="white-space:nowrap;">${p.dateStr}</td>
                    <td>${p.player}</td>
                    <td style="max-width:200px; overflow-x:auto; white-space:nowrap;">${p.scores.join(', ')}</td>
                    <td style="color:#ffda88; font-weight:bold;">${p.total}</td>
                    <td><button class="delete-btn" data-id="${p.id}">✖</button></td>
                </tr>
            `;
        }
        tableBody.innerHTML = rows;
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = Number(btn.getAttribute('data-id'));
                if (!isNaN(id)) deletePartyById(id);
            });
        });
    }

    function renderCurrentSession() {
        let html = '';
        for (let player of ALL_PLAYERS) {
            const throws = currentSessions[player];
            const cnt = throws.length;
            const sum = throws.reduce((a,b)=>a+b,0);
            html += `<div class="current-badge"><strong>${player.split(' ')[0]}</strong>: ${cnt}/10 | ${sum} очков</div>`;
        }
        if (html === '') html = '<span>Нет бросков</span>';
        sessionDisplay.innerHTML = html;
    }

    function renderLiveButtons() {
        let btns = '';
        for (let player of ALL_PLAYERS) {
            btns += `<button class="player-live-btn" data-player="${player}">🎯 ${player}<br><span style="font-size:0.65rem;">добавить бросок</span></button>`;
        }
        liveButtonsDiv.innerHTML = btns;
        document.querySelectorAll('.player-live-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const player = btn.getAttribute('data-player');
                let points = 20;
                const manualVal = parseInt(manualScoreInput.value, 10);
                if (!isNaN(manualVal) && manualVal>=0 && manualVal<=180) points = manualVal;
                addThrow(player, points);
            });
        });
    }

    function renderRating(statsMap) {
        const sorted = Array.from(statsMap.entries())
            .filter(([_,d]) => d.parties > 0)
            .sort((a,b) => b[1].totalPoints - a[1].totalPoints);
        if (sorted.length === 0) {
            ratingArea.innerHTML = `<h3 style="font-size:1.1rem;">🏅 РЕЙТИНГ</h3><p style="background:#0b2417; padding:8px; border-radius:1rem;">Нет данных</p>`;
            return;
        }
        let html = `<h3 style="font-size:1.1rem; margin:10px 0 5px;">🏅 РЕЙТИНГ</h3><div class="table-wrapper"><table style="min-width:300px;"><thead><tr><th>#</th><th>Игрок</th><th>Партий</th><th>Сумма</th><th>Среднее</th></tr></thead><tbody>`;
        sorted.forEach(([player, data], idx) => {
            const avg = data.parties ? (data.totalPoints / data.parties).toFixed(1) : 0;
            html += `<tr><td>${idx+1}</td><td><strong>${player}</strong></td><td>${data.parties}</td><td>${data.totalPoints}</td><td>${avg}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        ratingArea.innerHTML = html;
    }

    function renderRecords(statsMap) {
        let globalBest = 0, bestPlayer = '';
        let totalLeader = { name: '', points: 0 };
        for (let [player, data] of statsMap.entries()) {
            if (data.bestParty > globalBest) { globalBest = data.bestParty; bestPlayer = player; }
            if (data.totalPoints > totalLeader.points) { totalLeader = { name: player, points: data.totalPoints }; }
        }
        recordsArea.innerHTML = `
            <div class="record-item"><div>🏆 МАКСИМУМ ЗА ПАРТИЮ</div><div class="record-number">${globalBest}</div><div style="font-size:0.7rem;">${bestPlayer || '—'}</div></div>
            <div class="record-item"><div>💎 ЛИДЕР ПО СУММЕ</div><div class="record-number">${totalLeader.points}</div><div style="font-size:0.7rem;">${totalLeader.name || '—'}</div></div>
            <div class="record-item"><div>🎲 ВСЕГО ПАРТИЙ</div><div class="record-number">${partiesData.length}</div></div>
        `;
    }

    function renderAll() {
        const stats = computeStats();
        renderStatsCards(stats);
        renderHistory();
        renderCurrentSession();
        renderLiveButtons();
        renderRating(stats);
        renderRecords(stats);
    }

    // импорт файлов (CSV/JSON)
    function parseImportedData(text, filename) {
        const lines = text.split(/\r?\n/).filter(l=>l.trim());
        const newParties = [];
        const isJson = filename.toLowerCase().endsWith('.json');
        if (isJson) {
            try {
                const arr = JSON.parse(text);
                if (Array.isArray(arr)) {
                    for (let item of arr) {
                        if (item.player && item.scores && Array.isArray(item.scores) && item.scores.length===10 && item.dateStr && ALL_PLAYERS.includes(item.player)) {
                            const total = item.scores.reduce((a,b)=>a+b,0);
                            newParties.push({ id: Date.now()+Math.random(), player: item.player, scores: item.scores, total, dateStr: item.dateStr });
                        }
                    }
                }
            } catch(e) { alert("Ошибка JSON"); return []; }
            return newParties;
        }
        for (let line of lines) {
            let player="", dateStr="", scoresStr="";
            if (line.includes('|')) {
                const parts = line.split('|');
                if (parts.length>=3) { player=parts[0].trim(); dateStr=parts[1].trim(); scoresStr=parts[2].trim(); }
            } else if (line.includes(',')) {
                const parts = line.split(',');
                if (parts.length>=3) { player=parts[0].trim(); dateStr=parts[1].trim(); scoresStr=parts.slice(2).join(',').trim(); }
            } else continue;
            const numbers = scoresStr.split(/\s+/).map(Number).filter(n=>!isNaN(n) && n>=0 && n<=180);
            if (numbers.length===10 && player && dateStr && ALL_PLAYERS.includes(player)) {
                const total = numbers.reduce((a,b)=>a+b,0);
                newParties.push({ id: Date.now()+Math.random(), player, scores: numbers, total, dateStr });
            }
        }
        return newParties;
    }

    function importFile() {
        const file = importFileInput.files[0];
        if (!file) { alert("Выберите файл"); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
            const content = e.target.result;
            const newParties = parseImportedData(content, file.name);
            if (newParties.length===0) { alert("Не найдено корректных партий. Формат: игрок,дата,10 чисел через пробел (разделитель | или ,)"); return; }
            partiesData.push(...newParties);
            alert(`Добавлено ${newParties.length} партий`);
            renderAll();
            importFileInput.value = '';
        };
        reader.readAsText(file, 'UTF-8');
    }

    function resetAllHistory() {
        if (confirm("Удалить ВСЕ сохранённые партии? Текущие броски останутся.")) {
            partiesData = [];
            renderAll();
        }
    }

    function printReport() {
        const win = window.open('', '_blank');
        const stats = computeStats();
        let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Дартс отчёт</title><style>body{font-family:sans-serif;margin:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #aaa;padding:6px}</style></head><body><h1>Отчёт по дартсу</h1><p>${new Date().toLocaleString()}</p><h2>Статистика</h2><table><tr><th>Игрок</th><th>Партий</th><th>Сумма</th><th>Рекорд</th></tr>`;
        for (let [p,d] of stats.entries()) {
            html += `<tr><td>${p}</td><td>${d.parties}</td><td>${d.totalPoints}</td><td>${d.bestParty}</td></tr>`;
        }
        html += `</table><h2>Партии</h2><table><tr><th>Дата</th><th>Игрок</th><th>Очки</th><th>Сумма</th></tr>`;
        partiesData.forEach(p => {
            html += `<tr><td>${p.dateStr}</td><td>${p.player}</td><td>${p.scores.join(', ')}</td><td>${p.total}</td></tr>`;
        });
        html += `</table></body></html>`;
        win.document.write(html);
        win.document.close();
        win.print();
    }

    function sendEmail() {
        const stats = computeStats();
        let body = "ОТЧЁТ ПО ДАРТСУ\n\n";
        for (let [p,d] of stats.entries()) {
            body += `${p}: партий ${d.parties}, сумма ${d.totalPoints}, рекорд ${d.bestParty}\n`;
        }
        body += `\nВсего партий: ${partiesData.length}\n`;
        window.location.href = `mailto:?subject=Дартс статистика&body=${encodeURIComponent(body)}`;
    }

    // демо
    function addDemo() {
        if (partiesData.length === 0) {
            const today = getTodayDate();
            partiesData.push({ id: 101, player: "Стрельцов А.В.", scores: [20,20,20,20,40,60,80,20,20,80], total: 380, dateStr: today });
            partiesData.push({ id: 102, player: "Ишимцев А.Г.", scores: [30,30,30,30,30,30,30,30,30,30], total: 300, dateStr: today });
        }
        renderAll();
    }

    // события
    manualAddBtn.addEventListener('click', () => {
        const points = parseInt(manualScoreInput.value, 10);
        if (isNaN(points) || points<0 || points>180) { alert("Очки 0-180"); return; }
        const selected = prompt("Игрок (Стрельцов А.В., Ишимцев А.Г., Новоселов Е.В.)", "Стрельцов А.В.");
        if (selected && ALL_PLAYERS.includes(selected)) addThrow(selected, points);
        else alert("Игрок не найден");
    });
    resetSessionBtn.addEventListener('click', resetCurrentSessions);
    importBtn.addEventListener('click', () => importFileInput.click());
    importFileInput.addEventListener('change', importFile);
    resetAllBtn.addEventListener('click', resetAllHistory);
    printBtn.addEventListener('click', printReport);
    emailBtn.addEventListener('click', sendEmail);
    addDemo();
</script>
</body>
</html>
