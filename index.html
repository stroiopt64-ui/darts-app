<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Дартс "Ремезов"</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #1a472a; margin: 0; padding: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #f0f3e8; }
        .container { max-width: 1200px; margin: 0 auto; background: rgba(10, 25, 15, 0.95); border-radius: 1.5rem; padding: 1rem; border: 1px solid #d4af37; }
        h1 { text-align: center; font-size: 1.6rem; margin: 0; background: linear-gradient(135deg, #FFD966, #C5A028); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sync-status { text-align: center; font-size: 0.7rem; padding: 4px; border-radius: 20px; margin: 8px 0; background: #2c5e3a; }
        .sync-status.online { background: #2e7d32; }
        .sync-status.offline { background: #8d6e63; }
        .sync-status.error { background: #c62828; }
        .sync-status.autosave { background: #2196f3; }
        .online-panel { background: #0e2a1c; border-radius: 1.2rem; padding: 0.8rem; margin-bottom: 16px; border: 1px solid #d4af37; }
        .live-buttons { display: flex; flex-direction: column; gap: 10px; margin: 12px 0; }
        .player-live-btn { background: #1d3b28; border: 2px solid #f5b642; border-radius: 60px; padding: 14px 16px; font-size: 1rem; font-weight: bold; width: 100%; text-align: center; color: #ffefcf; cursor: pointer; touch-action: manipulation; transition: all 0.2s; }
        .player-live-btn.flash { background: #4caf50 !important; border-color: #ffeb3b; transform: scale(1.02); }
        .score-input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .score-input-group select, .score-input-group input { background: #1d3522; border: 1px solid #d4af37; padding: 12px; border-radius: 40px; color: #ffefcf; }
        .score-input-group select { flex: 2; }
        .score-input-group input { width: 90px; }
        .score-input-group button { flex: 1; background: #f5b642; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; color: #1e3a2a; }
        .undo-group { display: flex; gap: 8px; margin-top: 12px; }
        .undo-group button { flex: 1; background: #3a6b4e; padding: 10px; border: none; border-radius: 40px; font-weight: bold; color: white; cursor: pointer; }
        .current-session { background: #0b2417; border-radius: 1rem; padding: 10px; margin: 12px 0; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .current-badge { background: #2c5e3a; padding: 8px 12px; border-radius: 40px; text-align: center; min-width: 110px; }
        .current-badge.highlight { background: #4caf50; color: #1e3a2a; }
        .history-actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .history-actions button { flex: 1; padding: 10px 8px; font-size: 0.75rem; background: #4a5b3e; color: #ffecb3; border: none; border-radius: 40px; cursor: pointer; }
        .filter-area { display: flex; flex-wrap: wrap; gap: 8px; background: #0b2a18; padding: 8px; border-radius: 2rem; margin: 10px 0; justify-content: center; }
        .filter-area input, .filter-area button { padding: 6px 12px; border-radius: 30px; border: none; background: #1d3522; color: #ffefcf; }
        .stats-cards { display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
        .player-card { background: #0c2a18; border-radius: 1.2rem; padding: 0.8rem; border-left: 6px solid #f5b642; }
        .player-name { font-size: 1.2rem; font-weight: bold; }
        .stat { font-size: 0.8rem; display: flex; justify-content: space-between; }
        .stat-value { font-weight: 800; color: #ffd966; }
        .table-wrapper { overflow-x: auto; margin: 16px 0; border-radius: 1rem; background: #0b2417; }
        table { width: 100%; min-width: 550px; border-collapse: collapse; font-size: 0.7rem; }
        th, td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #2e6a3e; }
        th { background: #1c462c; color: #fad974; }
        .edit-btn, .delete-btn { background: #3a6b4e; border: none; border-radius: 20px; padding: 4px 8px; margin: 0 2px; color: white; cursor: pointer; font-size: 0.6rem; }
        .delete-btn { background: #a13a2c; }
        .record-box { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .record-item { background: #1a3b26; border-radius: 1rem; padding: 8px; text-align: center; }
        .record-number { font-size: 1.4rem; font-weight: bold; color: #f3bc5c; }
        .footer { text-align: center; font-size: 0.6rem; margin-top: 16px; color: #aacf9e; }
        @media (min-width: 550px) {
            .live-buttons { flex-direction: row; }
            .stats-cards { flex-direction: row; flex-wrap: wrap; }
            .player-card { flex: 1; }
            .record-box { flex-direction: row; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 ДАРТС "Ремезов"</h1>
    <div id="syncStatus" class="sync-status offline">📡 Синхронизация: локальный режим</div>

    <div class="online-panel">
        <div style="text-align:center; font-weight:bold;">⚡ ТЕКУЩАЯ СЕССИЯ</div>
        <div id="currentSessionDisplay" class="current-session"><span>Нет бросков</span></div>

        <div class="live-buttons" id="liveButtons">
            <button class="player-live-btn" data-player="Стрельцов А.В.">🎯 Стрельцов А.В.</button>
            <button class="player-live-btn" data-player="Ишимцев А.Г.">🎯 Ишимцев А.Г.</button>
            <button class="player-live-btn" data-player="Новоселов Е.В.">🎯 Новоселов Е.В.</button>
        </div>

        <div class="score-input-group">
            <select id="scoreSelect">
                <option value="20">20</option><option value="40">40</option><option value="60">60</option>
                <option value="80">80</option><option value="100">100</option><option value="120">120</option>
                <option value="140">140</option><option value="160">160</option><option value="180">180</option>
                <option value="0">0</option>
            </select>
            <input type="number" id="manualScore" placeholder="своё" step="1" min="0" max="180">
            <button id="manualAddBtn">➕ Добавить</button>
        </div>

        <div class="undo-group">
            <button id="undoLastBtn" style="background:#e67e22;">↩️ Отмена</button>
            <button id="resetSessionBtn" style="background:#6d4c3c;">🔄 Сброс сессии</button>
            <button id="syncNowBtn" style="background:#2e7d32;">☁️ Сохранить в облако</button>
        </div>
    </div>

    <div class="history-actions">
        <button id="exportBtn">📤 Экспорт JSON</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none;">
        <button id="importBtn">📥 Импорт JSON</button>
        <button id="resetAllBtn" style="background:#6d4c3c;">🗑️ Сброс истории</button>
        <button id="printBtn">🖨️ Печать</button>
        <button id="loadFromCloudBtn" style="background:#2e7d32;">📥 Загрузить из облака</button>
    </div>

    <div class="filter-area">
        <span>📅 Фильтр:</span>
        <input type="date" id="filterStart">
        <input type="date" id="filterEnd">
        <button id="clearFilterBtn">Сбросить</button>
    </div>

    <div id="statsCards" class="stats-cards"></div>

    <div class="table-wrapper">
        <table><thead><tr><th>Дата</th><th>Игрок</th><th>Очки партии (10)</th><th>Сумма</th><th></th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="5">Нет партий. Нажмите на игрока!</td></tr></tbody>
    </table>
    </div>

    <div id="ratingArea"></div>
    <div id="recordsArea" class="record-box"></div>
    <div class="footer">✅ Автосохранение каждые 60 сек. Данные в Google Таблицу. Работает офлайн.</div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJGGpAICLDYJ1bUCXFd8biM_saSUuUlUlbOnArS3q4OUlDPORdGHzXCwk6mSEoMN5F/exec";
    
    let partiesData = [];
    let currentSessions = { "Стрельцов А.В.": [], "Ишимцев А.Г.": [], "Новоселов Е.В.": [] };
    const ALL_PLAYERS = ["Стрельцов А.В.", "Ишимцев А.Г.", "Новоселов Е.В."];
    const STORAGE_KEY = "darts_live_data";
    let lastThrowInfo = { player: null, timestamp: 0 };
    
    // ✅ АВТОСОХРАНЕНИЕ
    let hasUnsyncedChanges = false;
    let autoSyncTimer = null;
    let syncInProgress = false;
    const AUTO_SYNC_INTERVAL = 60000; // 60 секунд

    function generateId() {
        return `${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
    }

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ partiesData, currentSessions }));
    }

    function loadFromLocalStorage() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            partiesData = data.partiesData || [];
            currentSessions = data.currentSessions || { "Стрельцов А.В.": [], "Ишимцев А.Г.": [], "Новоселов Е.В.": [] };
            return true;
        } catch(e) { return false; }
    }

    function markDirty() {
        hasUnsyncedChanges = true;
    }

    function setSyncStatus(text, type = '') {
        const statusDiv = document.getElementById('syncStatus');
        statusDiv.innerHTML = text;
        statusDiv.className = `sync-status ${type}`.trim();
    }

    // ✅ УЛУЧШЕННАЯ СИНХРОНИЗАЦИЯ
    async function syncToCloud(isAuto = false) {
        if (syncInProgress) return false;
        syncInProgress = true;

        if (!isAuto) {
            setSyncStatus('☁️ Отправка данных в облако...', '');
        } else {
            setSyncStatus('🔄 Автосохранение...', 'autosave');
        }

        try {
            const body = new URLSearchParams({
                action: 'save',
                data: JSON.stringify(partiesData)
            });

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body
            });

            const result = await response.json();

            if (!result.ok) {
                throw new Error(result.error || 'Ошибка сохранения');
            }

            hasUnsyncedChanges = false;
            setSyncStatus(
                `☁️ ${isAuto ? 'Автосохранение' : 'Данные сохранены'} ✅ (${result.saved || 0})`, 
                'online'
            );

            setTimeout(() => {
                if (!hasUnsyncedChanges) {
                    setSyncStatus('☁️ Готово', 'online');
                }
            }, 2000);

            return true;
        } catch (e) {
            console.error('Sync error:', e);
            setSyncStatus('❌ Ошибка сохранения: ' + e.message, 'error');
            return false;
        } finally {
            syncInProgress = false;
        }
    }

    async function syncFromCloud() {
        setSyncStatus('☁️ Загрузка данных из облака...', '');

        try {
            const url = `${SCRIPT_URL}?action=load`;
            const response = await fetch(url, {
                method: 'GET'
            });

            const result = await response.json();

            if (!result.ok) {
                throw new Error(result.error || 'Ошибка загрузки');
            }

            if (Array.isArray(result.parties)) {
                partiesData = result.parties.map(p => ({
                    id: p.id || generateId(),
                    player: p.player || '',
                    scores: Array.isArray(p.scores) ? p.scores.map(Number) : [],
                    total: Number(p.total || 0),
                    dateStr: p.dateStr || new Date().toISOString().slice(0,10)
                })).filter(p => p.player && p.scores.length === 10);

                saveToLocalStorage();
                hasUnsyncedChanges = false;
                renderAll();

                setSyncStatus(`☁️ Данные загружены из облака ✅ (${partiesData.length})`, 'online');
            } else {
                setSyncStatus('☁️ В облаке нет данных', 'offline');
            }

            setTimeout(() => {
                setSyncStatus('☁️ Готово', 'online');
            }, 2000);

            return true;
        } catch (e) {
            console.error('Load error:', e);
            setSyncStatus('⚠️ Ошибка загрузки: ' + e.message, 'error');
            return false;
        }
    }

    async function autoSyncTick() {
        if (!navigator.onLine) {
            setSyncStatus('📡 Нет сети, локальный режим', 'offline');
            return;
        }

        if (!hasUnsyncedChanges) {
            return;
        }

        if (syncInProgress) {
            return;
        }

        await syncToCloud(true);
    }

    function startAutoSync() {
        if (autoSyncTimer) {
            clearInterval(autoSyncTimer);
        }
        autoSyncTimer = setInterval(autoSyncTick, AUTO_SYNC_INTERVAL);
    }

    function getTodayDate() { 
        return new Date().toISOString().slice(0,10); 
    }

    function saveParty(player, scoresArray) {
        if (scoresArray.length !== 10) return false;
        const total = scoresArray.reduce((s, v) => s + v, 0);
        partiesData.push({
            id: generateId(),
            player,
            scores: [...scoresArray],
            total,
            dateStr: getTodayDate()
        });
        currentSessions[player] = [];
        saveToLocalStorage();
        markDirty();
        renderAll();
        return true;
    }

    function addThrow(player, points) {
        if (points < 0 || points > 180) { 
            alert("Очки от 0 до 180"); 
            return false; 
        }
        currentSessions[player].push(points);
        lastThrowInfo = { player, timestamp: Date.now() };
        const btn = document.querySelector(`.player-live-btn[data-player="${player}"]`);
        if (btn) { 
            btn.classList.add('flash'); 
            setTimeout(() => btn.classList.remove('flash'), 300); 
        }
        if (currentSessions[player].length === 10) {
            saveParty(player, [...currentSessions[player]]);
        } else { 
            saveToLocalStorage(); 
            renderAll(); 
        }
        return true;
    }

    function undoLastThrow() {
        let lastPlayer = lastThrowInfo.player;
        if (!lastPlayer || !currentSessions[lastPlayer]?.length) {
            for (let p of ALL_PLAYERS) { 
                if (currentSessions[p].length > 0) { 
                    lastPlayer = p; 
                    break; 
                } 
            }
        }
        if (!lastPlayer) { 
            alert("Нет бросков для отмены"); 
            return; 
        }
        currentSessions[lastPlayer].pop();
        lastThrowInfo = currentSessions[lastPlayer].length > 0 
            ? { player: lastPlayer, timestamp: Date.now() } 
            : { player: null, timestamp: 0 };
        saveToLocalStorage();
        renderAll();
    }

    function deletePartyById(id) { 
        partiesData = partiesData.filter(p => p.id !== id); 
        saveToLocalStorage();
        markDirty();
        renderAll(); 
    }

    function editParty(id, newScores) {
        const index = partiesData.findIndex(p => p.id === id);
        if (index === -1) return;
        if (newScores.length !== 10) { 
            alert("Нужно ровно 10 чисел"); 
            return; 
        }
        partiesData[index].scores = [...newScores];
        partiesData[index].total = newScores.reduce((a,b)=>a+b,0);
        saveToLocalStorage();
        markDirty();
        renderAll();
    }

    function resetCurrentSessions() { 
        for (let p of ALL_PLAYERS) currentSessions[p] = []; 
        lastThrowInfo = { player: null, timestamp: 0 }; 
        saveToLocalStorage(); 
        renderAll(); 
    }

    function resetAllHistory() { 
        if (confirm("Удалить ВСЕ партии?")) { 
            partiesData = []; 
            saveToLocalStorage();
            markDirty();
            renderAll();
        } 
    }

    function computeStats() {
        const map = new Map();
        for (let p of ALL_PLAYERS) {
            map.set(p, { parties: 0, totalPoints: 0, bestParty: 0 });
        }
        for (let party of partiesData) {
            const rec = map.get(party.player);
            if (rec) {
                rec.parties++;
                rec.totalPoints += party.total;
                if (party.total > rec.bestParty) rec.bestParty = party.total;
            }
        }
        return map;
    }

    function getFilteredParties() {
        const start = document.getElementById('filterStart').value;
        const end = document.getElementById('filterEnd').value;
        if (!start && !end) return [...partiesData];
        return partiesData.filter(p => { 
            if (start && p.dateStr < start) return false; 
            if (end && p.dateStr > end) return false; 
            return true; 
        });
    }

    function renderStatsCards(statsMap) {
        let html = '';
        for (let [player, data] of statsMap.entries()) {
            html += `<div class="player-card">
                <div class="player-name">🎯 ${player}</div>
                <div class="stat"><span>📌 Партий:</span><span class="stat-value">${data.parties}</span></div>
                <div class="stat"><span>🏆 Сумма:</span><span class="stat-value">${data.totalPoints}</span></div>
                <div class="stat"><span>⚡ Рекорд:</span><span class="stat-value">${data.bestParty}</span></div>
            </div>`;
        }
        document.getElementById('statsCards').innerHTML = html;
    }

    function renderHistory() {
        const filtered = getFilteredParties();
        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) { 
            tbody.innerHTML = '<tr><td colspan="5">Нет партий. Добавьте броски!</td></tr>'; 
            return; 
        }
        let rows = '';
        for (let p of filtered.sort((a,b)=>b.dateStr.localeCompare(a.dateStr))) {
            rows += `<tr>
                <td>${p.dateStr}</td>
                <td>${p.player}</td>
                <td style="max-width:250px; overflow-x:auto;">${p.scores.join(', ')}</td>
                <td style="color:#ffda88;">${p.total}</td>
                <td>
                    <button class="edit-btn" data-id="${p.id}">✏️</button>
                    <button class="delete-btn" data-id="${p.id}">✖</button>
                </td>
            </tr>`;
        }
        tbody.innerHTML = rows;
        
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.onclick = () => { 
                const id = btn.dataset.id;
                const party = partiesData.find(p => p.id === id);
                if (party) {
                    const newScores = prompt("10 чисел через пробел", party.scores.join(" "));
                    if (newScores) {
                        const nums = newScores.trim().split(/\s+/).map(Number).filter(n => !isNaN(n) && n >= 0 && n <= 180);
                        if (nums.length === 10) editParty(id, nums);
                        else alert("Нужно ровно 10 чисел от 0 до 180");
                    }
                }
            };
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => deletePartyById(btn.dataset.id);
        });
    }

    function renderCurrentSession() {
        let html = '';
        const now = Date.now();
        for (let player of ALL_PLAYERS) {
            const throws = currentSessions[player];
            const cnt = throws.length;
            const sum = throws.reduce((a,b)=>a+b,0);
            const isHighlight = (lastThrowInfo.player === player && (now - lastThrowInfo.timestamp) < 2000);
            html += `<div class="current-badge ${isHighlight ? 'highlight' : ''}">
                <strong>${player.split(' ')[0]}</strong><br>${cnt}/10 бросков<br>${sum} очков
            </div>`;
        }
        document.getElementById('currentSessionDisplay').innerHTML = html || '<span>Нет бросков</span>';
    }

    function renderRating(statsMap) {
        const sorted = Array.from(statsMap.entries())
            .filter(([_,d]) => d.parties > 0)
            .sort((a,b) => b[1].totalPoints - a[1].totalPoints);
        
        const ratingDiv = document.getElementById('ratingArea');
        if (sorted.length === 0) {
            ratingDiv.innerHTML = '<h3>🏅 РЕЙТИНГ</h3><p style="background:#0b2417; padding:12px; border-radius:1rem;">Нет данных</p>';
            return;
        }
        
        let html = '<h3>🏅 РЕЙТИНГ</h3><div class="table-wrapper"><table style="min-width:400px;"><thead><tr><th>#</th><th>Игрок</th><th>Партий</th><th>Сумма очков</th><th>Среднее за партию</th></tr></thead><tbody>';
        for (let i = 0; i < sorted.length; i++) {
            const [player, data] = sorted[i];
            const avg = (data.totalPoints / data.parties).toFixed(1);
            html += `<tr>
                <td>${i+1}</td>
                <td><strong>${player}</strong></td>
                <td>${data.parties}</td>
                <td>${data.totalPoints}</td>
                <td>${avg}</td>
            </tr>`;
        }
        html += '</tbody></table></div>';
        ratingDiv.innerHTML = html;
    }

    function renderRecords(statsMap) {
        let globalBest = 0, bestPlayer = '';
        let totalLeader = { name: '', points: 0 };
        
        for (let [player, data] of statsMap.entries()) {
            if (data.bestParty > globalBest) { 
                globalBest = data.bestParty; 
                bestPlayer = player; 
            }
            if (data.totalPoints > totalLeader.points) { 
                totalLeader = { name: player, points: data.totalPoints }; 
            }
        }
        
        document.getElementById('recordsArea').innerHTML = `
            <div class="record-item">
                <div>🏆 МАКСИМУМ ЗА ПАРТИЮ</div>
                <div class="record-number">${globalBest}</div>
                <div>${bestPlayer || '—'}</div>
            </div>
            <div class="record-item">
                <div>💎 ЛИДЕР ПО СУММЕ</div>
                <div class="record-number">${totalLeader.points}</div>
                <div>${totalLeader.name || '—'}</div>
            </div>
            <div class="record-item">
                <div>🎲 ВСЕГО ПАРТИЙ</div>
                <div class="record-number">${partiesData.length}</div>
            </div>`;
    }

    function renderAll() { 
        const stats = computeStats(); 
        renderStatsCards(stats); 
        renderHistory(); 
        renderCurrentSession(); 
        renderRating(stats); 
        renderRecords(stats); 
    }

    function exportData() { 
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(new Blob([JSON.stringify({ partiesData, currentSessions }, null, 2)])); 
        a.download = `darts_${getTodayDate()}.json`; 
        a.click(); 
    }

    function importData(file) { 
        const reader = new FileReader(); 
        reader.onload = (e) => { 
            try { 
                const d = JSON.parse(e.target.result); 
                partiesData = d.partiesData || []; 
                currentSessions = d.currentSessions || { 
                    "Стрельцов А.В.": [], 
                    "Ишимцев А.Г.": [], 
                    "Новоселов Е.В.": [] 
                }; 
                saveToLocalStorage();
                markDirty();
                renderAll(); 
                alert("Импорт успешен"); 
            } catch(err) { 
                alert("Ошибка импорта"); 
            } 
        }; 
        reader.readAsText(file); 
    }

    function printReport() { 
        const win = window.open('', '_blank'); 
        win.document.write(`
            <html><head><title>Дартс отчёт</title>
            <style>body{font-family:sans-serif}table{border-collapse:collapse;width:100%}th,td{border:1px solid #aaa;padding:6px}</style></head>
            <body>
                <h1>Отчёт по дартсу</h1>
                <p>${new Date().toLocaleString()}</p>
                <h2>Статистика</h2>
                <table><thead><tr><th>Игрок</th><th>Партий</th><th>Сумма</th><th>Рекорд</th></tr></thead><tbody>
                    ${Array.from(computeStats().entries()).map(([p,d]) => 
                        `<tr><td>${p}</td><td>${d.parties}</td><td>${d.totalPoints}</td><td>${d.bestParty}</td></tr>`
                    ).join('')}
                </tbody></table>
                <h2>История</h2>
                <table><thead><tr><th>Дата</th><th>Игрок</th><th>Очки</th><th>Сумма</th></tr></thead><tbody>
                    ${partiesData.map(p => 
                        `<tr><td>${p.dateStr}</td><td>${p.player}</td><td>${p.scores.join(', ')}</td><td>${p.total}</td></tr>`
                    ).join('')}
                </tbody></table>
            </body></html>
        `); 
        win.document.close(); 
        win.print(); 
    }

    function setupEventListeners() {
        document.querySelectorAll('.player-live-btn').forEach(btn => {
            btn.onclick = () => { 
                let points = parseInt(document.getElementById('manualScore').value); 
                if (isNaN(points)) {
                    points = parseInt(document.getElementById('scoreSelect').value);
                }
                addThrow(btn.dataset.player, points); 
            };
        });

        document.getElementById('manualAddBtn').onclick = () => { 
            let points = parseInt(document.getElementById('manualScore').value); 
            if (isNaN(points)) {
                points = parseInt(document.getElementById('scoreSelect').value);
            }
            const ans = prompt("1-Стрельцов,2-Ишимцев,3-Новоселов","1");
            if (ans === "1") addThrow("Стрельцов А.В.", points);
            else if (ans === "2") addThrow("Ишимцев А.Г.", points);
            else if (ans === "3") addThrow("Новоселов Е.В.", points);
        };

        document.getElementById('undoLastBtn').onclick = undoLastThrow;
        document.getElementById('resetSessionBtn').onclick = resetCurrentSessions;
        document.getElementById('resetAllBtn').onclick = resetAllHistory;
        document.getElementById('exportBtn').onclick = exportData;
        document.getElementById('importBtn').onclick = () => document.getElementById('importFileInput').click();
        document.getElementById('importFileInput').onchange = (e) => { 
            if (e.target.files[0]) importData(e.target.files[0]); 
            e.target.value = ''; 
        };
        document.getElementById('printBtn').onclick = printReport;
        document.getElementById('clearFilterBtn').onclick = () => { 
            document.getElementById('filterStart').value = ''; 
            document.getElementById('filterEnd').value = ''; 
            renderAll(); 
        };
        document.getElementById('filterStart').onchange = () => renderAll();
        document.getElementById('filterEnd').onchange = () => renderAll();
        document.getElementById('syncNowBtn').onclick = () => syncToCloud(false);
        document.getElementById('loadFromCloudBtn').onclick = syncFromCloud;
    }

    async function init() {
        loadFromLocalStorage();

        if (!Array.isArray(partiesData)) partiesData = [];
        if (!currentSessions || typeof currentSessions !== 'object') {
            currentSessions = {
                "Стрельцов А.В.": [],
                "Ишимцев А.Г.": [],
                "Новоселов Е.В.": []
            };
        }

        renderAll();
        setupEventListeners();
        startAutoSync();

        window.addEventListener('online', async () => {
            setSyncStatus('🌐 Сеть восстановлена', 'online');
            await autoSyncTick();
        });

        window.addEventListener('offline', () => {
            setSyncStatus('📡 Нет сети, локальный режим', 'offline');
        });

        if (navigator.onLine) {
            setTimeout(async () => {
                await syncFromCloud();
            }, 1000);
        } else {
            setSyncStatus('📡 Нет сети, локальный режим', 'offline');
        }
    }

    init();
</script>
</body>
</html>
